<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking Modal</title>
    <!-- Font Poppins / Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red-color: #d32f2f;
            --grey-color: #e0e0e0;
            --text-main: #1a1a1a;
            --text-sub: #757575;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5; /* Background dummy */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Tombol untuk trigger modal */
        .btn-trigger {
            padding: 12px 24px;
            background-color: var(--red-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-trigger:hover {
            background-color: #b71c1c;
        }

        /* Overlay Hitam Transparan */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.55);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        /* Modal Box */
        .modal-box {
            background-color: #ffffff;
            width: 90%;
            max-width: 480px;
            border-radius: 20px;
            padding: 30px 20px 50px 20px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.show .modal-box {
            transform: translateY(0);
        }

        /* Tombol Close (X) */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            font-size: 28px;
            color: #999;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
        }
        .close-btn:hover {
            color: #333;
        }

        /* Judul Besar Modal */
        .modal-title {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            margin-top: 10px;
            margin-bottom: 50px;
        }

        /* Container Timeline */
        .timeline-container {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Garis Vertikal Background Abu-abu */
        .timeline-line-bg {
            position: absolute;
            top: 6px; 
            bottom: 6px; 
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            background-color: var(--grey-color);
            z-index: 1;
        }

        /* Garis Progress Merah */
        .timeline-progress {
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            background-color: var(--red-color);
            z-index: 2;
            height: 0%;
            transition: height 0.8s ease-in-out;
        }

        /* Wrapper Step */
        .timeline-step {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 12px;
            margin-bottom: 90px;
            z-index: 3;
        }
        
        .timeline-step:last-child {
            margin-bottom: 0;
        }

        /* Bulatan Status */
        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: var(--grey-color);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            transition: background-color 0.4s ease, box-shadow 0.4s ease;
            box-sizing: border-box;
            /* Tambahan efek transisi dot saat terisi */
            transition-delay: 0s;
        }

        /* Efek Active pada Bulatan (Warna merah & glow) */
        .timeline-step.active .dot {
            background-color: var(--red-color);
            box-shadow: 0 0 8px rgba(211, 47, 47, 0.4);
            /* Delay active dot agar warna berubah setelah garis progress lewat */
            transition-delay: 0.4s;
        }

        /* Step 1 dot tidak butuh delay karena langsung aktif di awal */
        .timeline-step.step-1.active .dot {
            transition-delay: 0s;
        }

        /* Konten Teks */
        .step-content {
            position: absolute;
            width: 220px;
        }

        /* Teks Step 1 - Di Kiri */
        .step-1 .step-content {
            right: 50%;
            margin-right: 25px;
            text-align: right;
            top: -10px;
        }

        /* Teks Step 2 - Di Kanan */
        .step-2 .step-content {
            left: 50%;
            margin-left: 25px;
            text-align: left;
            top: -10px;
        }

        /* Teks Step 3 - Di Bawah */
        .step-3 .step-content {
            top: 25px; 
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 250px;
        }

        /* Style Typography Teks */
        .step-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 2px;
        }

        .step-subtitle {
            font-size: 11px;
            color: var(--text-sub);
            font-weight: 400;
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <!-- Tombol untuk test -->
    <button class="btn-trigger" onclick="openModal()">Tampilkan Tracking</button>

    <!-- Modal Background -->
    <div class="modal-overlay" id="trackingModal">
        <!-- Modal Content -->
        <div class="modal-box">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h2 class="modal-title">Lacak pesanan anda</h2>

            <div class="timeline-container">
                <!-- Garis vertikal background abu -->
                <div class="timeline-line-bg"></div>
                <!-- Garis progress merah animasi -->
                <div class="timeline-progress" id="progressLine"></div>

                <!-- Step 1 -->
                <div class="timeline-step step-1" id="step1">
                    <div class="dot"></div>
                    <div class="step-content">
                        <div class="step-title">Pesanan Telah Dikonfirmasi</div>
                        <div class="step-subtitle">( Pesanan sedang diproses )</div>
                    </div>
                </div>

                <!-- Step 2 -->
                <div class="timeline-step step-2" id="step2">
                    <div class="dot"></div>
                    <div class="step-content">
                        <div class="step-title">Pesanan sudah siap</div>
                        <div class="step-subtitle">( Pesanan akan diantarkan )</div>
                    </div>
                </div>

                <!-- Step 3 -->
                <div class="timeline-step step-3" id="step3">
                    <div class="dot"></div>
                    <div class="step-content">
                        <div class="step-title">Pesanan selesai</div>
                        <div class="step-subtitle">( pesanan telah di sajikan )</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('trackingModal');
        const progressLine = document.getElementById('progressLine');
        let trackingInterval;
        let currentStep = 1;
        const totalSteps = 3;

        // Fungsi buka modal
        function openModal() {
            modal.classList.add('show');
            resetTracking();
            
            // Memberi sedikit delay sebelum animasi mulai untuk efek smooth
            setTimeout(() => {
                startTrackingAnimation();
            }, 500);
        }

        // Fungsi tutup modal
        function closeModal() {
            modal.classList.remove('show');
            clearInterval(trackingInterval);
        }

        // Reset semua status ke awal
        function resetTracking() {
            clearInterval(trackingInterval);
            currentStep = 1;
            
            // Reset garis merah
            progressLine.style.height = '0%';
            
            // Reset semua bulatan
            for(let i = 1; i <= totalSteps; i++) {
                document.getElementById(`step${i}`).classList.remove('active');
            }
        }

        // Animasi progress berjalan otomatis
        function startTrackingAnimation() {
            // Aktifkan step 1 langsung
            updateStatus(currentStep);

            trackingInterval = setInterval(() => {
                currentStep++;
                if (currentStep <= totalSteps) {
                    updateStatus(currentStep);
                } else {
                    clearInterval(trackingInterval); // Hentikan jika sudah selesai
                }
            }, 2500); // Durasi pergerakan antar step
        }

        // Update UI sesuai status/step
        function updateStatus(step) {
            // Aktifkan class 'active' pada step ini
            document.getElementById(`step${step}`).classList.add('active');

            // Hitung tinggi garis merah
            let heightPercentage = '0%';
            if (step === 1) heightPercentage = '0%';
            else if (step === 2) heightPercentage = '50%';
            else if (step === 3) heightPercentage = 'calc(100% - 12px)';

            progressLine.style.height = heightPercentage;
        }

        // Tutup modal jika overlay background hitam di-klik
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                closeModal();
            }
        });
        
        // Auto open untuk pertama kali dimuat (opsional)
        window.onload = () => {
            openModal();
        }
    </script>
</body>
</html>
